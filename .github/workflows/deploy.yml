name: Deploy-CICD

on:
  push:
    branches:
      - devel
      - main
  workflow_dispatch:

jobs:
  Deploy_CI:
    name: Deploy-CICD
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        shell: bash
        run: |
          set -e
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "echo SSH_OK && whoami && hostname"

  Deploy_CD_Devel:
    name: Deploy to Devel
    runs-on: ubuntu-latest
    needs: deploy-cicd
    if: github.ref == 'refs/heads/devel'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy devel
        shell: bash
        run: |
          set -e
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "cd /home/ec2-user/apps/kinasis-backend && ./config/deploy.sh devel"

      - name: Verify devel
        shell: bash
        run: |
          set -e
          curl -fsS https://devapi.kinasisdev.shop

  Deploy_CD_Main:
    name: Deploy to Main
    runs-on: ubuntu-latest
    needs: deploy-cicd
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy main
        shell: bash
        run: |
          set -e
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "cd /home/ec2-user/apps/kinasis-backend && ./config/deploy.sh main"

      - name: Verify main
        shell: bash
        run: |
          set -e
          curl -fsS https://api.kinasisdev.shop